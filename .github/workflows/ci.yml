name: ci

# Reproducibility gate: rebuild the client from source in the SAME pinned environment as
# build.sh (golang:1.21.8 container) and prove the committed bin/ matches byte-for-byte.
# Pinning the container, not just the Go version, is what makes the output host-independent.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: go vet (pinned toolchain)
        run: docker run --rm --platform linux/amd64 -v "$PWD":/w -w /w/src golang:1.21.8 go vet ./...

      - name: Committed binaries match a fresh reproducible build
        run: |
          ./build.sh
          if ! git diff --quiet -- bin/; then
            echo "::error::bin/ does not match a fresh reproducible build. Run ./build.sh and commit the result."
            git diff --stat -- bin/
            exit 1
          fi
          echo "bin/ matches a fresh reproducible build, and SHA256SUMS is current."
