name: ci

# Reproducibility gate: rebuild the client from source and prove the committed
# bin/ binaries match byte-for-byte. This is the audit-trust guarantee, anyone
# can confirm the shipped binary corresponds to the public source.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pinned exactly: reproducible output depends on the toolchain version.
          go-version: '1.21.8'

      - name: go vet
        working-directory: src
        run: go vet ./...

      - name: Committed binaries match a fresh reproducible build
        run: |
          ./build.sh
          if ! git diff --quiet -- bin/; then
            echo "::error::bin/ does not match a fresh build from src/. Run ./build.sh and commit the result."
            git diff --stat -- bin/
            exit 1
          fi
          echo "bin/ matches a fresh build, and SHA256SUMS is current."
