name: release

# On a vX.Y.Z tag: build all platforms in a clean runner and publish a GitHub
# Release with the binaries + SHA256SUMS. Public build logs + checksums let users
# verify their download. Uses the built-in gh CLI (no third-party actions) so the
# release pipeline itself is auditable.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag must match plugin.json version
        run: |
          PLUGIN_V="v$(grep '"version"' .claude-plugin/plugin.json | head -1 \
            | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          if [ "$PLUGIN_V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match plugin.json version $PLUGIN_V"
            exit 1
          fi

      - name: Build
        run: ./build.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Reproducible build from this tag. Verify a download with:
          \`shasum -a 256 -c SHA256SUMS\`" \
            bin/adtention-darwin-amd64 \
            bin/adtention-darwin-arm64 \
            bin/adtention-linux-amd64 \
            bin/adtention-linux-arm64 \
            bin/SHA256SUMS
